# Station Configuration
# Format: station_id  output=/path  playlist=/path  [key=value ...]
# 
# Available Keys:
# - output      : HLS output directory (e.g., /var/www/hls/radio1)
# - playlist    : Folder containing MP3s to auto-load on startup
# - random      : true/false (shuffle playlist)
# - loop        : true/false (loop playlist)
# - crossfade   : duration in seconds (e.g., crossfade=3)
# - rtmp        : RTMP URL for live streaming (e.g., rtmp://server/key)
# - webrtc_nat_ip: Optional public/NAT 1:1 IP address for WebRTC (e.g., 203.0.113.50)
# - webrtc_ingress_token: Security token to authorize browser live microphone publishing
# - display_text: Text overlay for the stream (use underscores for spaces, e.g., MY_RADIO_LIVE)
# - logo        : Path to transparent PNG logo (e.g., /path/to/logo.png)
# - background_image: Path to static background image (e.g., /path/to/bg.jpg) [CPU EFFICIENT]
# - video_loop  : Path to background MP4 video (optional, defaults to Misty Fog)

# Example 1: Standard HLS Radio
radio1      output=/var/www/hls/radio1  playlist=/home/user/music random=true loop=true crossfade=3 aac32=false opus128=false crossfade=3 mp3=false webrtc=false
# disable or enable HLS output aac32, aac64, aac128, opus32, opus64, opus128  
# enable mp3=true (feeding to icecast)

# Example 2: Radio with YouTube Live Streaming
# radio2    output=/var/www/hls/radio2  playlist=/home/user/jazz rtmp=rtmp://a.rtmp.youtube.com/live2/key display_text=JAZZ_RELAX_LIVE
